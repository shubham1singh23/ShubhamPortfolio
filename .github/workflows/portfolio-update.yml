name: Portfolio Content Update

on:
  repository_dispatch:
    types: [portfolio-updated]

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Log update event
        run: |
          echo "Portfolio updated at: ${{ github.event.client_payload.updated_at }}"
          echo "Source: ${{ github.event.client_payload.source }}"

      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
